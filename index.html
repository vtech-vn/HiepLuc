<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiepLuc - Financial Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-text">HIEPLUC</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">📊 Báo cáo tài chính</a>
                <a href="#" class="nav-item">📓 Sổ cái</a>
                <a href="#" class="nav-item">⚙️ Thiết lập</a>
            </nav>
            <div class="sidebar-footer">
                <p>© 2026 VAS Engine</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1>Bảng Cân Đối Kế Toán</h1>
                </div>
                <div class="controls">
                    <div class="date-input-group">
                        <label for="as-of-date">Tại ngày:</label>
                        <input type="date" id="as-of-date">
                    </div>
                    <button id="refresh-btn" class="btn btn-primary">🔄 Cập nhật</button>
                </div>
            </header>

            <section class="summary-grid">
                <div class="card summary-card">
                    <div>
                        <span class="label">Tổng Tài Sản</span>
                        <h2 class="value" id="total-assets">0 ₫</h2>
                    </div>
                    <div class="card-icon asset-icon">💰</div>
                </div>
                <div class="card summary-card">
                    <div>
                        <span class="label">Nợ Phải Trả</span>
                        <h2 class="value" id="total-liabilities">0 ₫</h2>
                    </div>
                    <div class="card-icon liability-icon">💳</div>
                </div>
                <div class="card summary-card">
                    <div>
                        <span class="label">Vốn Chủ Sở Hữu</span>
                        <h2 class="value" id="total-equity">0 ₫</h2>
                    </div>
                    <div class="card-icon equity-icon">🏗️</div>
                </div>
            </section>

            <div class="details-grid">
                <div class="card">
                    <h3>Chi tiết các chỉ tiêu</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Mã số</th>
                                    <th>Chỉ tiêu</th>
                                    <th class="text-right">Số cuối kỳ</th>
                                    <th class="text-right">Số đầu kỳ</th>
                                </tr>
                            </thead>
                            <tbody id="report-body">
                                <tr><td colspan="4" class="text-center">Đang tải...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="analysis-column">
                    <div class="card">
                        <h3>Cơ cấu Nguồn vốn</h3>
                        <div class="chart-wrapper">
                            <canvas id="capital-chart"></canvas>
                        </div>
                    </div>
                    <div class="card">
                        <h3>Phân bổ Tài sản</h3>
                        <div class="chart-wrapper">
                            <canvas id="assets-chart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="notification-container"></div>

    <script src="data_processor.js"></script>
    <script src="app.js"></script>
</body>
</html>
